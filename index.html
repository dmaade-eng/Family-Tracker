<style>
:root {
  --bg:       #0f1923;
  --bg2:      #162030;
  --bg3:      #1e2d40;
  --card:     #1a2636;
  --card2:    #243347;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.15);
  --text:     #f0f4f8;
  --text2:    #8fa8c0;
  --text3:    #546e84;
  --yellow:   #FFD93D;
  --orange:   #FF6B35;
  --pink:     #FF6B9D;
  --teal:     #4ECDC4;
  --blue:     #45B7D1;
  --green:    #6BCB77;
  --purple:   #A78BFA;
  --red:      #FF6B6B;
  --r:        16px;
  --r-sm:     10px;
  --r-lg:     24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg)}
body{font-family:'Nunito',sans-serif;color:var(--text);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(78,205,196,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(255,107,53,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(167,139,250,.04) 0%,transparent 60%);
}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;
  pointer-events:none;z-index:9999;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:20px}
#loading .logo{font-family:'Fredoka One',cursive;font-size:36px;color:var(--yellow);
  animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.spinner{width:40px;height:40px;border:3px solid var(--bg3);
  border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HEADER ── */
.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;z-index:100;
}
.logo-text{font-family:'Fredoka One',cursive;font-size:22px;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text}
.header-right{display:flex;align-items:center;gap:8px}
.week-nav{display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:4px 10px}
.week-nav button{background:transparent;border:none;color:var(--text2);
  cursor:pointer;font-size:16px;padding:2px 4px;border-radius:6px;transition:color .15s}
.week-nav button:hover{color:var(--text)}
.week-nav button:disabled{opacity:.25;cursor:default}
.week-nav span{font-size:12px;color:var(--text2);min-width:80px;text-align:center}
.lock-btn{display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:7px 12px;cursor:pointer;
  font-size:13px;color:var(--text2);font-family:'Nunito',sans-serif;
  font-weight:600;transition:all .15s}
.lock-btn:hover{border-color:var(--border2);color:var(--text)}
.lock-btn.unlocked{background:rgba(107,203,119,.15);border-color:rgba(107,203,119,.4);color:var(--green)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);
  display:inline-block;margin-right:4px;transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
#syncLabel{font-size:11px;color:var(--text3)}

/* ── NAV ── */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;position:sticky;top:57px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:transparent;border:none;border-bottom:3px solid transparent;
  padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.nav-btn:hover{color:var(--text2)}
.nav-btn.active{color:var(--text);border-bottom-color:var(--yellow)}
.nav-btn .wk-earn{font-size:10px;display:block;margin-top:1px;font-weight:600;color:var(--green)}
.nav-btn.active .wk-earn{color:var(--green)}
.nav-btn.pet-tab{color:var(--orange)}
.nav-btn.pet-tab.active{border-bottom-color:var(--orange)}

/* ── MAIN ── */
.main{max-width:920px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

/* ── BANNER ── */
.ro-banner{background:rgba(69,183,209,.12);border:1px solid rgba(69,183,209,.25);
  border-radius:var(--r-sm);padding:9px 14px;font-size:13px;color:var(--blue);
  margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;font-weight:600}
.retro-banner{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);
  border-radius:var(--r-sm);padding:9px 14px;font-size:13px;color:var(--purple);
  margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;font-weight:600}

/* ── CHILD HERO ── */
.child-hero{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.child-name-block .cname{font-family:'Fredoka One',cursive;font-size:28px;color:var(--text)}
.child-name-block .csub{font-size:13px;color:var(--text3);margin-top:2px;font-weight:600}
.payout-hero{text-align:right;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 18px;min-width:130px}
.payout-hero .ph-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.8px;font-weight:700}
.payout-hero .ph-val{font-size:30px;font-weight:800;color:var(--green);
  font-family:'Fredoka One',cursive}

/* ── PROGRESS RING ── */
.rings-row{display:flex;gap:16px;margin-bottom:1.5rem;flex-wrap:wrap}
.ring-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;
  flex:1;min-width:100px}
.ring-wrap{position:relative;width:72px;height:72px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.ring-pct{font-size:16px;font-weight:800;color:var(--text)}
.ring-sub{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ring-card-label{font-size:12px;color:var(--text2);font-weight:700;text-align:center}

/* ── STREAK ── */
.streak-badge{display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,217,61,.12);border:1px solid rgba(255,217,61,.3);
  border-radius:99px;padding:4px 12px;font-size:13px;font-weight:800;color:var(--yellow)}
.streak-badge.cold{background:var(--bg3);border-color:var(--border);color:var(--text3)}

/* ── METRICS ROW ── */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;margin-bottom:1.5rem}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px}
.mcard-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:3px;font-weight:700}
.mcard-val{font-size:18px;font-weight:800;color:var(--text)}
.mcard-val.g{color:var(--green)}.mcard-val.a{color:var(--yellow)}.mcard-val.r{color:var(--red)}
.mcard-val.p{color:var(--purple)}

/* ── DAYS GRID ── */
.days-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);margin-bottom:8px;font-weight:700}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:1.5rem}
.day-col{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);overflow:hidden;transition:border-color .2s}
.day-col.today{border-color:var(--teal)}
.day-col.perfect{border-color:var(--green);background:rgba(107,203,119,.08)}
.day-head{background:var(--bg3);padding:7px 3px 5px;text-align:center;
  border-bottom:1px solid var(--border)}
.day-head .dn{font-size:11px;font-weight:800;color:var(--text2)}
.day-head .ds{font-size:9px;font-weight:700;margin-top:1px}
.day-head .ds.pos{color:var(--green)}.day-head .ds.neg{color:var(--red)}
.day-tasks{padding:5px 3px;display:flex;flex-direction:column;align-items:center;gap:3px}
.tbtn{width:28px;height:28px;border-radius:50%;
  border:2px solid var(--border2);background:transparent;
  cursor:pointer;font-size:13px;font-weight:800;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;touch-action:manipulation;position:relative;overflow:hidden}
.tbtn:hover{border-color:var(--text2);color:var(--text2)}
.tbtn.done{background:var(--green);border-color:var(--green);color:#fff;
  animation:tickPop .3s cubic-bezier(.34,1.56,.64,1)}
.tbtn.bonus{background:var(--yellow);border-color:var(--yellow);color:#1a1a1a;
  animation:tickPop .3s cubic-bezier(.34,1.56,.64,1)}
.tbtn.pen{background:var(--red);border-color:var(--red);color:#fff;
  animation:tickPop .3s cubic-bezier(.34,1.56,.64,1)}
.tbtn.ro{cursor:default}
.tbtn.ro:hover{border-color:var(--border2);color:var(--text3)}
.tbtn.done.ro{background:var(--green);border-color:var(--green);color:#fff}
.tbtn.bonus.ro{background:var(--yellow);border-color:var(--yellow);color:#1a1a1a}
.tbtn.pen.ro{background:var(--red);border-color:var(--red);color:#fff}
@keyframes tickPop{0%{transform:scale(0.6)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.tdiv{width:60%;height:1px;background:var(--border);margin:2px 0}

/* ── LEGEND ── */
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
@media(max-width:480px){.legend-grid{grid-template-columns:1fr}}
.lsec h4{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text3);margin-bottom:7px;font-weight:700}
.lrow{display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:4px}
.lrow.penrow{border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.05)}
.l-icon{font-size:15px;width:20px;text-align:center}
.l-info{flex:1}.l-name{font-size:13px;font-weight:700;color:var(--text)}
.l-desc{font-size:11px;color:var(--text3)}
.l-val{font-size:12px;font-weight:800;min-width:34px;text-align:right}
.l-val.g{color:var(--green)}.l-val.r{color:var(--red)}.l-val.a{color:var(--yellow)}

/* ── PAYOUT BREAKDOWN ── */
.payout-card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.payout-card h4{font-family:'Fredoka One',cursive;font-size:18px;color:var(--text);margin-bottom:12px}
.pc-row{display:flex;justify-content:space-between;font-size:13px;
  color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border);font-weight:600}
.pc-total{display:flex;justify-content:space-between;font-size:16px;
  font-weight:800;color:var(--text);padding:10px 0 0}

/* ── PAYDAY BUTTON ── */
.payday-btn{width:100%;padding:16px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  border:none;cursor:pointer;font-family:'Fredoka One',cursive;
  font-size:20px;color:#1a1a1a;letter-spacing:.5px;
  transition:transform .15s,box-shadow .15s;margin-bottom:1.5rem;
  box-shadow:0 4px 20px rgba(255,107,53,.3)}
.payday-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,107,53,.4)}
.payday-btn:active{transform:scale(.98)}
.payday-btn:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}

/* ── BUCKETS ── */
.buckets-title{font-family:'Fredoka One',cursive;font-size:20px;color:var(--text);
  margin-bottom:1rem}
.buckets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;margin-bottom:1.5rem}
.bucket{border-radius:var(--r);padding:1.25rem;position:relative;overflow:hidden}
.bucket-charity{background:linear-gradient(135deg,rgba(255,107,157,.15),rgba(255,107,157,.05));
  border:1px solid rgba(255,107,157,.3)}
.bucket-goals{background:linear-gradient(135deg,rgba(78,205,196,.15),rgba(78,205,196,.05));
  border:1px solid rgba(78,205,196,.3)}
.bucket-invest{background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(167,139,250,.05));
  border:1px solid rgba(167,139,250,.3)}
.bucket-icon{font-size:28px;margin-bottom:8px}
.bucket-name{font-family:'Fredoka One',cursive;font-size:18px;margin-bottom:2px}
.bucket-charity .bucket-name{color:var(--pink)}
.bucket-goals .bucket-name{color:var(--teal)}
.bucket-invest .bucket-name{color:var(--purple)}
.bucket-balance{font-size:28px;font-weight:800;color:var(--text);
  font-family:'Fredoka One',cursive;margin-bottom:4px}
.bucket-sub{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:10px}
.bucket-detail{font-size:13px;color:var(--text2);font-weight:600;
  font-style:italic;margin-bottom:10px}

/* Goal progress bars */
.goal-item{background:rgba(0,0,0,.2);border-radius:var(--r-sm);padding:10px;margin-bottom:8px}
.goal-item:last-child{margin-bottom:0}
.goal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.goal-emoji{font-size:18px}
.goal-name{font-size:13px;font-weight:700;color:var(--text);flex:1;margin:0 8px}
.goal-amt{font-size:12px;font-weight:800;color:var(--teal)}
.goal-bar-wrap{height:8px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:99px;background:var(--teal);transition:width .6s ease}
.goal-weeks{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600}
.add-goal-btn{width:100%;padding:8px;border-radius:var(--r-sm);
  background:rgba(78,205,196,.1);border:1px dashed rgba(78,205,196,.3);
  color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all .15s;margin-top:8px}
.add-goal-btn:hover{background:rgba(78,205,196,.2)}

/* ── PAYDAY HISTORY ── */
.payday-history{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.payday-history h4{font-family:'Fredoka One',cursive;font-size:18px;
  color:var(--text);margin-bottom:12px}
.ph-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.ph-row:last-child{border:none}
.ph-date{color:var(--text3);font-weight:600}
.ph-splits{display:flex;gap:10px}
.ph-split{font-size:12px;font-weight:700}
.ph-split.c{color:var(--pink)}.ph-split.g{color:var(--teal)}.ph-split.i{color:var(--purple)}
.ph-total{font-weight:800;color:var(--green)}
.no-history{font-size:13px;color:var(--text3);font-style:italic;padding:8px 0}

/* ── DASHBOARD ── */
.dash-title{font-family:'Fredoka One',cursive;font-size:26px;color:var(--text);margin-bottom:.25rem}
.dash-sub{font-size:13px;color:var(--text3);margin-bottom:1.5rem;font-weight:600}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;margin-bottom:1.5rem}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.scard-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:5px;font-weight:700}
.scard-val{font-size:22px;font-weight:800;color:var(--text)}
.scard-val.g{color:var(--green)}.scard-val.a{color:var(--yellow)}.scard-val.r{color:var(--red)}
.leaderboard{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.leaderboard h3{font-family:'Fredoka One',cursive;font-size:18px;color:var(--text);margin-bottom:1rem}
.lb-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lb-row:last-child{margin-bottom:0}
.lb-av{width:36px;height:36px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  font-weight:800;color:var(--text);flex-shrink:0;border:2px solid var(--border2)}
.lb-name{font-size:13px;font-weight:800;color:var(--text);min-width:62px}
.lb-track{flex:1;height:10px;background:var(--bg3);border-radius:99px;overflow:hidden}
.lb-fill{height:100%;border-radius:99px;background:var(--green);transition:width .5s ease}
.lb-fill.pet{background:var(--orange)}
.lb-amt{font-size:13px;font-weight:800;color:var(--green);min-width:52px;text-align:right}
.lb-amt.pet{color:var(--orange)}

/* ── PET ── */
.pet-hero{background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,217,61,.08));
  border:1px solid rgba(255,107,53,.3);border-radius:var(--r);
  padding:1.5rem;margin-bottom:1.5rem;text-align:center}
.pet-name{font-family:'Fredoka One',cursive;font-size:32px;color:var(--orange);margin-bottom:4px}
.pet-score-big{font-family:'Fredoka One',cursive;font-size:56px;color:var(--yellow);line-height:1}
.pet-bar-wrap{height:14px;background:rgba(255,255,255,.1);border-radius:99px;
  overflow:hidden;margin:12px auto;max-width:300px}
.pet-bar-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .6s ease}
.pet-verdict{font-size:15px;font-weight:700;color:var(--text2);margin-top:8px}

/* ── SETTINGS ── */
.s-section{margin-bottom:2rem}
.s-section h3{font-family:'Fredoka One',cursive;font-size:20px;color:var(--text);margin-bottom:4px}
.s-note{font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600}
.s-row{display:flex;align-items:center;gap:8px;padding:9px 13px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:5px}
.s-row label{flex:1;font-size:13px;color:var(--text);font-weight:600}

<script>
// ═══════════════════════════════════════
//  CONSTANTS & DEFAULTS
// ═══════════════════════════════════════
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const GOAL_EMOJIS = ['🎮','🛹','⚽','🎸','📱','🎨','🏄','🚴','🎯','🌟','🦋','🏆','🎪','🚀','🎭'];
const CHILD_COLORS = [
  {ring:'#4ECDC4',av:'rgba(78,205,196,.2)',avb:'rgba(78,205,196,.5)'},
  {ring:'#FF6B9D',av:'rgba(255,107,157,.2)',avb:'rgba(255,107,157,.5)'},
  {ring:'#FFD93D',av:'rgba(255,217,61,.2)',avb:'rgba(255,217,61,.5)'},
  {ring:'#FF6B35',av:'rgba(255,107,53,.2)',avb:'rgba(255,107,53,.5)'},
];

const DEFAULT_CONFIG = {
  pin:'1234',
  children:[
    {name:'Chelsea',base:10,isPet:false,buckets:{charity:10,goals:70,invest:20},charityName:'',goals:[],bucketBalances:{charity:0,goals:0,invest:0}},
    {name:'Troy',   base:10,isPet:false,buckets:{charity:10,goals:70,invest:20},charityName:'',goals:[],bucketBalances:{charity:0,goals:0,invest:0}},
    {name:'Sienna', base:10,isPet:false,buckets:{charity:10,goals:70,invest:20},charityName:'',goals:[],bucketBalances:{charity:0,goals:0,invest:0}},
    {name:'Dash',   base:0, isPet:true, buckets:{charity:0,goals:0,invest:0},  charityName:'',goals:[],bucketBalances:{charity:0,goals:0,invest:0}},
  ],
  tasks:[
    {id:'t1',name:'Morning routine',   desc:'Up, dressed, bag ready on time', pct:10,type:'core', icon:'☀️'},
    {id:'t2',name:'Homework done',     desc:'Completed before screens',        pct:15,type:'core', icon:'📚'},
    {id:'t3',name:'Tidy room',         desc:'Room tidy before dinner',         pct:10,type:'core', icon:'🏠'},
    {id:'t4',name:'Screen time limits',desc:'Off devices by agreed time',      pct:10,type:'core', icon:'📵'},
    {id:'t5',name:'Kind to siblings',  desc:'No fighting, no drama',           pct:5, type:'core', icon:'🤝'},
    {id:'t6',name:'Extra chore',       desc:'Vacuum, laundry, bins etc',       pct:10,type:'bonus',icon:'⭐'},
    {id:'t7',name:'Helped with dinner',desc:'Set table or helped cook',        pct:8, type:'bonus',icon:'🍽️'},
  ],
  penalties:[
    {id:'p1',name:'Rude or disrespectful',    pct:10,icon:'🚫'},
    {id:'p2',name:'Lied to a parent',          pct:15,icon:'⚡'},
    {id:'p3',name:'Left a mess after warning', pct:5, icon:'🗑️'},
  ],
  petTasks:[
    {id:'pet1',name:'Remembered my walk',      desc:'Someone walked me — good human', type:'core', icon:'🦮'},
    {id:'pet2',name:'Fed on time',              desc:'Meals arrived promptly',          type:'core', icon:'🍖'},
    {id:'pet3',name:'Did not steal food',       desc:'Heroic self-control exhibited',  type:'core', icon:'🥩'},
    {id:'pet4',name:'No zoomies indoors',       desc:'Contained the chaos admirably',  type:'core', icon:'🌀'},
    {id:'pet5',name:'Excellent boy',            desc:'General tail wags and good vibes',type:'bonus',icon:'🏆'},
    {id:'pet6',name:'Did not eat the homework', desc:'Showed remarkable restraint',    type:'bonus',icon:'📄'},
  ],
  bonusCap:20,penaltyCap:20
};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let cfg=null, ticks={}, weekOffset=0;
let isParent=false, activeTab='dashboard', activeChild=0;
let pinBuffer='', pendingPayday=null, editingGoalChild=-1;

// ═══════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════
function dbRef(p){return window._fbRef(window._fbDb,p)}

function initFirebase(){
  window._fbOnValue(dbRef('config'),snap=>{
    cfg = snap.exists() ? snap.val() : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    if(!snap.exists()) window._fbSet(dbRef('config'),cfg);
    // ensure buckets exist on all children
    cfg.children.forEach((ch,i)=>{
      if(!ch.buckets) ch.buckets={charity:10,goals:70,invest:20};
      if(!ch.bucketBalances) ch.bucketBalances={charity:0,goals:0,invest:0};
      if(!ch.goals) ch.goals=[];
      if(typeof ch.charityName==='undefined') ch.charityName='';
    });
    maybeRender();
  });
  window._fbOnValue(dbRef('ticks'),snap=>{
    if(snap.exists()){
      const raw=snap.val(); ticks={};
      Object.keys(raw).forEach(k=>{if(raw[k]===true) ticks[k]=true;});
    } else { ticks={}; }
    maybeRender();
  });
}

function maybeRender(){if(!cfg) return; showApp(); render(); setSyncStatus('ok');}

function setSyncStatus(s){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  if(!dot) return;
  if(s==='ok'){dot.className='sync-dot ok';lbl.textContent='live';}
  else if(s==='saving'){dot.className='sync-dot';lbl.textContent='saving…';}
  else{dot.className='sync-dot err';lbl.textContent='offline';}
}

function saveTick(key,val){
  setSyncStatus('saving');
  const r=window._fbRef(window._fbDb,'ticks/'+key);
  const op=val?window._fbSet(r,true):window._fbRemove(r);
  op.then(()=>setSyncStatus('ok')).catch(err=>{
    console.error('write error',err);setSyncStatus('err');
    const l=document.getElementById('syncLabel');
    if(l) l.textContent='check Firebase rules';
  });
}

function saveConfig(){
  setSyncStatus('saving');
  window._fbSet(dbRef('config'),cfg)
    .then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err'));
}

function showApp(){
  ['loading','appHeader','mainNav','mainContent','pageFooter'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el) return;
    if(i===0) el.style.display='none';
    else el.style.display=i===1?'flex':i===4?'block':'block';
    if(i===2) el.style.display='flex';
  });
}

// ═══════════════════════════════════════
//  WEEK HELPERS
// ═══════════════════════════════════════
function getWeekKey(offset){
  const now=new Date(),dow=now.getDay()===0?6:now.getDay()-1;
  const mon=new Date(now); mon.setDate(now.getDate()-dow+offset*7);
  const y=mon.getFullYear(),m=String(mon.getMonth()+1).padStart(2,'0'),d=String(mon.getDate()).padStart(2,'0');
  return`${y}-${m}-${d}`;
}
function getWeekLabel(offset){
  const now=new Date(),dow=now.getDay()===0?6:now.getDay()-1;
  const mon=new Date(now); mon.setDate(now.getDate()-dow+offset*7);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  if(offset===0) return'This week'; if(offset===-1) return'Last week';
  return f(mon)+' – '+f(sun);
}
function getTodayDayIndex(){const d=new Date().getDay(); return d===0?6:d-1;}
function isSunday(){return new Date().getDay()===0;}

function tickKey(ci,wo,day,tid){return`${getWeekKey(wo)}_${ci}_${day}_${tid}`;}
function getTick(ci,wo,day,tid){return!!ticks[tickKey(ci,wo,day,tid)];}

function doToggle(ci,wo,day,tid){
  if(!isParent) return;
  const k=tickKey(ci,wo,day,tid),val=!ticks[k];
  if(val){ticks[k]=true;}else{delete ticks[k];}
  saveTick(k,val);
  // confetti on perfect day
  if(val){
    const coreTasks=cfg.tasks.filter(t=>t.type==='core');
    const allDone=coreTasks.every(t=>getTick(ci,wo,day,t.id));
    if(allDone && cfg.tasks.filter(t=>t.type==='core').some(t=>t.id===tid)) spawnConfetti();
  }
  render();
}

// ═══════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════
function spawnConfetti(){
  const colors=['#FFD93D','#FF6B35','#4ECDC4','#FF6B9D','#6BCB77','#A78BFA'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;
      border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(3500));
  }
}

// ═══════════════════════════════════════
//  CALC ENGINE
// ═══════════════════════════════════════
function calcDay(ci,wo,dayIdx){
  const ch=cfg.children[ci];
  if(ch.isPet) return{net:0,daily:0,coreMissedPct:0,bonusPct:0,penPct:0};
  const daily=ch.base/7,day=DAYS[dayIdx];
  const core=cfg.tasks.filter(t=>t.type==='core');
  const bonus=cfg.tasks.filter(t=>t.type==='bonus');
  const totalCorePct=core.reduce((s,t)=>s+t.pct,0);
  let coreEarned=0,bonusRaw=0,penRaw=0;
  core.forEach(t=>{if(getTick(ci,wo,day,t.id)) coreEarned+=t.pct;});
  bonus.forEach(t=>{if(getTick(ci,wo,day,t.id)) bonusRaw+=t.pct;});
  cfg.penalties.forEach(p=>{if(getTick(ci,wo,day,p.id)) penRaw+=p.pct;});
  const coreMissedPct=totalCorePct-coreEarned;
  const bonusPct=Math.min(bonusRaw,cfg.bonusCap);
  const penPct=Math.min(penRaw,cfg.penaltyCap);
  const net=Math.max(0,daily*(1-coreMissedPct/100+bonusPct/100-penPct/100));
  return{net,daily,coreMissedPct,bonusPct,penPct};
}

function calcWeek(ci,wo){
  const ch=cfg.children[ci];
  if(ch.isPet){
    const all=cfg.petTasks; let done=0,total=all.length*7;
    DAYS.forEach(day=>all.forEach(t=>{if(getTick(ci,wo,day,t.id)) done++;}));
    return{payout:0,pct:total>0?Math.round(done/total*100):0,penaltyTotal:0,bonusEarned:0,coreMissed:0};
  }
  let payout=0,penaltyTotal=0,bonusEarned=0,coreMissed=0;
  const daily=ch.base/7;
  DAYS.forEach((_,i)=>{
    const ds=calcDay(ci,wo,i);
    payout+=ds.net;
    penaltyTotal+=ds.penPct/100*daily;
    bonusEarned+=ds.bonusPct/100*daily;
    coreMissed+=ds.coreMissedPct/100*daily;
  });
  return{payout,penaltyTotal,bonusEarned,coreMissed};
}

function calcStreak(ci){
  let streak=0;
  const today=getTodayDayIndex();
  const coreTasks=cfg.tasks.filter(t=>t.type==='core');
  // check backwards from yesterday
  for(let wo=0;wo>=-8;wo--){
    const maxDay=wo===0?today-1:6;
    for(let di=maxDay;di>=0;di--){
      const day=DAYS[di];
      const allDone=coreTasks.every(t=>getTick(ci,wo,day,t.id));
      if(allDone) streak++;
      else return streak;
    }
  }
  return streak;
}

function calcWeekPct(ci,wo){
  const ch=cfg.children[ci];
  if(ch.isPet) return calcWeek(ci,wo).pct;
  const core=cfg.tasks.filter(t=>t.type==='core');
  let done=0,total=core.length*7;
  DAYS.forEach(day=>core.forEach(t=>{if(getTick(ci,wo,day,t.id)) done++;}));
  return total>0?Math.round(done/total*100):0;
}

function calcAllTime(ci){
  if(cfg.children[ci].isPet) return 0;
  const weeks=new Set(Object.keys(ticks).filter(k=>k.split('_')[1]===String(ci)).map(k=>k.split('_')[0]));
  weeks.add(getWeekKey(weekOffset));
  let total=0;
  weeks.forEach(wk=>{
    DAYS.forEach((day)=>{
      const daily=cfg.children[ci].base/7;
      const core=cfg.tasks.filter(t=>t.type==='core');
      const bonus=cfg.tasks.filter(t=>t.type==='bonus');
      const totalCorePct=core.reduce((s,t)=>s+t.pct,0);
      let ce=0,br=0,pr=0;
      const tk=tid=>!!ticks[`${wk}_${ci}_${day}_${tid}`];
      core.forEach(t=>{if(tk(t.id)) ce+=t.pct;});
      bonus.forEach(t=>{if(tk(t.id)) br+=t.pct;});
      cfg.penalties.forEach(p=>{if(tk(p.id)) pr+=p.pct;});
      total+=Math.max(0,daily*(1-(totalCorePct-ce)/100+Math.min(br,cfg.bonusCap)/100-Math.min(pr,cfg.penaltyCap)/100));
    });
  });
  return total;
}

function isDayPerfect(ci,wo,dayIdx){
  const core=cfg.tasks.filter(t=>t.type==='core');
  return core.every(t=>getTick(ci,wo,DAYS[dayIdx],t.id));
}

function openPayday(ci){
  const ch=cfg.children[ci];
  const wk=calcWeek(ci,weekOffset);
  const total=wk.payout;
  const splits={
    charity: Math.round(total*(ch.buckets.charity/100)*100)/100,
    goals:   Math.round(total*(ch.buckets.goals/100)*100)/100,
    invest:  Math.round(total*(ch.buckets.invest/100)*100)/100,
  };
  pendingPayday={ci,total,splits,weekKey:getWeekKey(weekOffset)};
  document.getElementById('paydayChild').textContent=`${ch.name}'s week`;
  document.getElementById('paydayTotal').textContent=`S$${total.toFixed(2)}`;
  document.getElementById('paydaySplits').innerHTML=`
    <div class="ps-card c"><div class="ps-label">Charity</div><div class="ps-amount">S$${splits.charity.toFixed(2)}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${ch.buckets.charity}%</div></div>
    <div class="ps-card g"><div class="ps-label">Goals</div><div class="ps-amount">S$${splits.goals.toFixed(2)}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${ch.buckets.goals}%</div></div>
    <div class="ps-card i"><div class="ps-label">Invest</div><div class="ps-amount">S$${splits.invest.toFixed(2)}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${ch.buckets.invest}%</div></div>`;
  document.getElementById('paydayModal').style.display='flex';
}

function closePayday(){document.getElementById('paydayModal').style.display='none'; pendingPayday=null;}

function confirmPayday(){
  if(!pendingPayday) return;
  const {ci,total,splits,weekKey}=pendingPayday;
  const ch=cfg.children[ci];
  if(!ch.bucketBalances) ch.bucketBalances={charity:0,goals:0,invest:0};
  ch.bucketBalances.charity=Math.round((ch.bucketBalances.charity+splits.charity)*100)/100;
  ch.bucketBalances.invest =Math.round((ch.bucketBalances.invest +splits.invest )*100)/100;
  // distribute goals split to first incomplete goal first
  let remaining=splits.goals;
  if(ch.goals && ch.goals.length>0){
    ch.goals.forEach(g=>{
      if(remaining<=0) return;
      const needed=Math.max(0,(g.target||0)-(g.saved||0));
      const add=Math.min(needed,remaining);
      g.saved=Math.round(((g.saved||0)+add)*100)/100;
      remaining=Math.round((remaining-add)*100)/100;
    });
  }
  if(remaining>0) ch.bucketBalances.invest=Math.round((ch.bucketBalances.invest+remaining)*100)/100;
  // record history
  if(!ch.paydayHistory) ch.paydayHistory=[];
  ch.paydayHistory.unshift({date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),total,splits,weekKey});
  if(ch.paydayHistory.length>20) ch.paydayHistory=ch.paydayHistory.slice(0,20);
  saveConfig();
  closePayday();
  spawnConfetti();
  render();
}

function handleLockBtn(){
  if(isParent){isParent=false;updateLockUI();render();}
  else openPin();
}
function openPin(){pinBuffer='';document.getElementById('pinError').textContent='';updatePinDots();document.getElementById('pinModal').style.display='flex';}
function closePin(){document.getElementById('pinModal').style.display='none';pinBuffer='';}
function handleBackdropClick(e){if(e.target.id==='pinModal') closePin();}
function pinKey(k){
  if(k==='del') pinBuffer=pinBuffer.slice(0,-1);
  else if(k==='clr') pinBuffer='';
  else if(pinBuffer.length<4) pinBuffer+=k;
  updatePinDots();document.getElementById('pinError').textContent='';
  if(pinBuffer.length===4) checkPin();
}
function updatePinDots(){for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);}
function checkPin(){
  if(pinBuffer===(cfg.pin||'1234')){isParent=true;closePin();updateLockUI();render();}
  else{
    document.getElementById('pinError').textContent='Incorrect PIN';
    pinBuffer='';updatePinDots();
    const m=document.querySelector('#pinModal .modal');
    if(m){m.style.animation='shake .3s ease';setTimeout(()=>{m.style.animation='';},300);}
  }
}
function updateLockUI(){
  const btn=document.getElementById('lockBtn');
  const icon=document.getElementById('lockIcon');
  const txt=document.getElementById('lockText');
  if(!btn) return;
  if(isParent){btn.classList.add('unlocked');icon.textContent='🔓';if(txt) txt.textContent='Parent';}
  else{btn.classList.remove('unlocked');icon.textContent='🔒';if(txt) txt.textContent='Login';}

  DAYS.forEach((day,i)=>{
    const isToday=i===todayIdx;
    daysHtml+=`<div class="day-col${isToday?' today':''}">
      <div class="day-head"><div class="dn">${day}</div></div>
      <div class="day-tasks">
        ${core.map(t=>{const on=getTick(ci,wo,day,t.id);return`<button class="tbtn${on?' done':''}${ro?' ro':''}" title="${t.name}" ${ro?'':` onclick="doToggle(${ci},${wo},'${day}','${t.id}')"`}>${on?'✓':''}</button>`;}).join('')}
        <div class="tdiv"></div>
        ${bonus.map(t=>{const on=getTick(ci,wo,day,t.id);return`<button class="tbtn${on?' bonus':''}${ro?' ro':''}" title="${t.name}" ${ro?'':` onclick="doToggle(${ci},${wo},'${day}','${t.id}')"`}>${on?'★':''}</button>`;}).join('')}
      </div>
    </div>`;
  });
  daysHtml+=`</div>`;
  const verdict=wk.pct>=80?'🏆 Outstanding week for Dash!':wk.pct>=60?'👍 Pretty good boy this week.':wk.pct>=40?'😬 Room for improvement, Dash.':'🐾 Dash, we need to talk.';
  return`${ro?`<div class="ro-banner">👀 Read-only view</div>`:''}
  <div class="pet-hero">
    <div class="pet-name">🐾 Dash</div>
    <div class="pet-score-big">${wk.pct}%</div>
    <div class="pet-bar-wrap"><div class="pet-bar-fill" style="width:${wk.pct}%"></div></div>
    <div class="pet-verdict">${verdict}</div>
  </div>
  <div class="metrics-row">
    <div class="mcard"><div class="mcard-lbl">Core tasks</div><div class="mcard-val">${core.reduce((s,t)=>s+DAYS.filter(d=>getTick(ci,wo,d,t.id)).length,0)}/${core.length*7}</div></div>
    <div class="mcard"><div class="mcard-lbl">Bonus tasks</div><div class="mcard-val a">${bonus.reduce((s,t)=>s+DAYS.filter(d=>getTick(ci,wo,d,t.id)).length,0)}/${bonus.length*7}</div></div>
    <div class="mcard"><div class="mcard-lbl">Weekly score</div><div class="mcard-val a">${wk.pct}%</div></div>
  </div>
  ${daysHtml}
  <div class="legend-grid">
    <div class="lsec"><h4>Good behaviour</h4>${core.map(t=>`<div class="lrow"><div class="l-icon">${t.icon}</div><div class="l-info"><div class="l-name">${t.name}</div><div class="l-desc">${t.desc}</div></div></div>`).join('')}</div>
    <div class="lsec"><h4>Bonus behaviour</h4>${bonus.map(t=>`<div class="lrow"><div class="l-icon">${t.icon}</div><div class="l-info"><div class="l-name">${t.name}</div><div class="l-desc">${t.desc}</div></div></div>`).join('')}</div>
  </div>`;
}

// ── SETTINGS ──
function renderSettings(){
  if(!isParent) return`<p style="color:var(--text3);font-size:14px;font-weight:600">Login as parent to access settings.</p>`;
  const c=cfg;
  return`<div class="s-section"><h3>Children & weekly base</h3>
    ${c.children.filter(ch=>!ch.isPet).map((ch,i)=>`<div class="s-row">
      <label>${ch.name}</label>
      <input type="text" value="${ch.name}" onchange="updChildName(${i},this.value)">
      <span style="font-size:12px;color:var(--text3);font-weight:700">S$</span>
      <input type="number" min="0" step="1" value="${ch.base}" onchange="updChildBase(${i},this.value)">
    </div>`).join('')}
  </div>
  <div class="s-section"><h3>Bucket splits per child</h3>
    <div class="s-note">Must add up to 100% per child.</div>
    ${c.children.filter(ch=>!ch.isPet).map((ch,i)=>`
      <div style="font-size:13px;font-weight:700;color:var(--text2);margin:8px 0 4px">${ch.name}</div>
      <div class="s-row"><label>❤️ Charity %</label><input type="number" min="0" max="100" step="5" value="${ch.buckets.charity}" onchange="updBucket(${i},'charity',this.value)"><span class="pct-pill r">${ch.buckets.charity}%</span></div>
      <div class="s-row"><label style="font-size:12px">   Charity name</label><input type="text" value="${ch.charityName||''}" placeholder="e.g. WWF" onchange="updCharityName(${i},this.value)"></div>
      <div class="s-row"><label>🎯 Goals %</label><input type="number" min="0" max="100" step="5" value="${ch.buckets.goals}" onchange="updBucket(${i},'goals',this.value)"><span class="pct-pill g">${ch.buckets.goals}%</span></div>
      <div class="s-row"><label>📈 Investment %</label><input type="number" min="0" max="100" step="5" value="${ch.buckets.invest}" onchange="updBucket(${i},'invest',this.value)"><span class="pct-pill">${ch.buckets.invest}%</span></div>
    `).join('')}
  </div>
  <div class="s-section"><h3>Core task weights</h3>
    <div class="s-note">% deducted from daily budget per day missed.</div>
    ${c.tasks.filter(t=>t.type==='core').map(t=>{const idx=c.tasks.findIndex(x=>x.id===t.id);return`<div class="s-row"><label>${t.icon} ${t.name}</label><input type="number" min="0" max="100" step="1" value="${t.pct}" onchange="updTaskPct(${idx},this.value)"><span class="pct-pill">${t.pct}%</span></div>`;}).join('')}
  </div>
  <div class="s-section"><h3>Bonus task weights</h3>
    <div class="s-note">Capped at <input type="number" min="0" max="100" step="5" value="${c.bonusCap}" style="width:44px;font-size:12px;padding:2px 5px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text)" onchange="updBonusCap(this.value)">% of daily budget per day.</div>
    ${c.tasks.filter(t=>t.type==='bonus').map(t=>{const idx=c.tasks.findIndex(x=>x.id===t.id);return`<div class="s-row"><label>${t.icon} ${t.name}</label><input type="number" min="0" max="100" step="1" value="${t.pct}" onchange="updTaskPct(${idx},this.value)"><span class="pct-pill">${t.pct}%</span></div>`;}).join('')}
  </div>
  <div class="s-section"><h3>Penalty box</h3>
    <div class="s-note">Capped at <input type="number" min="0" max="100" step="5" value="${c.penaltyCap}" style="width:44px;font-size:12px;padding:2px 5px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text)" onchange="updPenaltyCap(this.value)">% per day.</div>
    ${c.penalties.map((p,i)=>`<div class="s-row" style="border-color:rgba(255,107,107,.2)"><label>${p.icon} ${p.name}</label><input type="number" min="0" max="100" step="1" value="${p.pct}" onchange="updPenPct(${i},this.value)"><span class="pct-pill r">${p.pct}%</span></div>`).join('')}
  </div>
  <div class="s-section"><h3>Parent PIN</h3>
    <div class="s-row">
      <label>New PIN</label>
      <input type="password" id="newPinInput" maxlength="4" placeholder="4 digits" style="width:90px;letter-spacing:6px;font-size:16px">
      <button class="save-btn" onclick="savePin()">Save</button>
    </div>
    <div id="pinSaveMsg" style="font-size:12px;color:var(--green);margin-top:4px;min-height:16px;font-weight:700"></div>
  </div>
  <div class="s-section"><h3>Data</h3>
    <div class="s-row" style="border-color:rgba(255,107,107,.2)">
      <label style="color:var(--red)">Reset all tick data</label>
      <button class="danger-btn" onclick="resetTicks()">Reset</button>
    </div>
  </div>`;
}

// Settings handlers
function updChildName(i,v){cfg.children[i].name=v;saveConfig();render();}
function updChildBase(i,v){cfg.children[i].base=parseFloat(v)||0;saveConfig();render();}
function updTaskPct(i,v){cfg.tasks[i].pct=parseInt(v)||0;saveConfig();render();}
function updPenPct(i,v){cfg.penalties[i].pct=parseInt(v)||0;saveConfig();render();}
function updBonusCap(v){cfg.bonusCap=parseInt(v)||0;saveConfig();render();}
function updPenaltyCap(v){cfg.penaltyCap=parseInt(v)||0;saveConfig();render();}
function updBucket(i,bucket,v){cfg.children[i].buckets[bucket]=parseInt(v)||0;saveConfig();render();}
function updCharityName(i,v){cfg.children[i].charityName=v;saveConfig();}
function savePin(){
  const v=document.getElementById('newPinInput').value.trim();
  if(!/^\d{4}$/.test(v)){document.getElementById('pinSaveMsg').textContent='Must be 4 digits';return;}
  cfg.pin=v;saveConfig();
  document.getElementById('pinSaveMsg').textContent='PIN updated ✓';
  setTimeout(()=>{const el=document.getElementById('pinSaveMsg');if(el) el.textContent='';},3000);
}
function resetTicks(){
  if(confirm('Reset ALL tick data?')){
    ticks={};
    window._fbSet(dbRef('ticks'),null).then(()=>{setSyncStatus('ok');render();}).catch(()=>setSyncStatus('err'));
  }
}

// Week nav
document.getElementById('prevWeek').addEventListener('click',()=>{weekOffset--;render();});
document.getElementById('nextWeek').addEventListener('click',()=>{if(weekOffset<0){weekOffset++;render();}});

// Boot
if(window._fbReady){initFirebase();}
else{
  window.addEventListener('firebase-ready',initFirebase);
  setTimeout(()=>{
    if(!cfg) document.getElementById('loading').innerHTML=
      `<div style="text-align:center;padding:2rem;max-width:380px">
        <div style="font-size:32px;margin-bottom:1rem">⚙️</div>
        <h2 style="font-family:'Fredoka One',cursive;color:var(--yellow);margin-bottom:.75rem">Firebase not configured</h2>
        <p style="font-size:13px;color:var(--text3);line-height:1.7;font-weight:600">
          Open this file in VS Code and follow the setup instructions at the top to connect Firebase.
        </p>
      </div>`;
  },5000);
}
</script>
</body>
</html>
